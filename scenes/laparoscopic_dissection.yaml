# Laparoscopic Tissue Dissection Scene
# A scene for training tissue manipulation and dissection tasks

metadata:
  name: "Laparoscopic Dissection"
  description: "Tissue dissection task with laparoscopic instruments"
  version: "1.0.0"
  author: "SurgRL Team"
  created: "2026-04-05"
  tags:
    - laparoscopic
    - dissection
    - intermediate

physics:
  gravity: [0.0, 0.0, -9.81]
  timestep: 0.002
  solver_iterations: 50
  integrator: implicit
  contact_model: constraint
  ground_plane: true
  ground_friction: 0.8
  materials:
    - name: tissue_material
      friction: 0.4
      restitution: 0.0
      damping: 0.5
    - name: instrument_material
      friction: 0.5
      restitution: 0.05
      damping: 0.1

environment:
  name: laparoscopic_suite
  lights:
    - name: main_light
      type: directional
      direction: [0.0, 0.0, -1.0]
      color:
        r: 1.0
        g: 1.0
        b: 1.0
        a: 1.0
      intensity: 1.0
      cast_shadows: true
    - name: scope_light
      type: point
      position:
        x: 0.0
        y: 0.0
        z: 0.5
      color:
        r: 0.9
        g: 0.95
        b: 1.0
        a: 1.0
      intensity: 0.8
      cast_shadows: false
  cameras:
    - name: laparoscope_camera
      type: perspective
      pose:
        position:
          x: 0.0
          y: 0.0
          z: 0.3
        orientation:
          w: 1.0
          x: 0.0
          y: 0.0
          z: 0.0
      fov: 60.0
      near: 0.01
      far: 2.0
      active: true
  ground_plane:
    enabled: true
    size: [1.0, 1.0]
    color:
      r: 0.4
      g: 0.4
      b: 0.4
      a: 1.0
    friction: 0.8
  surgical_table:
    name: operating_table
    pose:
      position:
        x: 0.0
        y: 0.0
        z: 0.0
      orientation:
        w: 1.0
        x: 0.0
        y: 0.0
        z: 0.0
    dimensions: [0.6, 0.4, 0.1]
    color:
      r: 0.3
      g: 0.3
      b: 0.35
      a: 1.0

robots:
  - name: left_manipulator
    type: laparoscopic
    description: Left laparoscopic instrument arm
    urdf_path: assets/robots/laparoscopic_arm.urdf
    base_pose:
      position:
        x: -0.1
        y: 0.15
        z: 0.2
      orientation:
        w: 0.966
        x: 0.0
        y: 0.259
        z: 0.0
    control_mode: position
    control_rate: 100.0
    max_linear_velocity: 0.2
    max_angular_velocity: 0.5
    end_effectors:
      - name: grasper
        type: forceps
        max_aperture: 0.015
        force_limit: 8.0

  - name: right_manipulator
    type: laparoscopic
    description: Right laparoscopic instrument arm
    urdf_path: assets/robots/laparoscopic_arm.urdf
    base_pose:
      position:
        x: 0.1
        y: 0.15
        z: 0.2
      orientation:
        w: 0.966
        x: 0.0
        y: -0.259
        z: 0.0
    control_mode: position
    control_rate: 100.0
    max_linear_velocity: 0.2
    max_angular_velocity: 0.5
    end_effectors:
      - name: scissors
        type: scissors
        max_aperture: 0.01
        force_limit: 5.0

tissues:
  - name: target_tissue
    type: organ
    description: Simulated organ tissue for dissection
    geometry:
      primitive: box
      dimensions: [0.08, 0.06, 0.02]
    physics:
      stiffness: 8000.0
      damping: 0.12
      density: 1050.0
      poissons_ratio: 0.45
      youngs_modulus: 20000.0
      tear_threshold: 4000.0
    pose:
      position:
        x: 0.0
        y: 0.0
        z: 0.05
      orientation:
        w: 1.0
        x: 0.0
        y: 0.0
        z: 0.0
    attachments:
      - name: base_attachment
        position:
          x: 0.0
          y: -0.03
          z: 0.0
        fixed: true
    color:
      r: 0.85
      g: 0.65
      b: 0.55
      a: 1.0
    anatomical_region: abdomen
    pathology: adhesions

instruments:
  - name: laparoscope
    type: camera
    description: Laparoscopic camera instrument
    mesh:
      path: assets/instruments/laparoscope.obj
      scale: [1.0, 1.0, 1.0]
    physics:
      mass: 0.05
      friction: 0.3
      damping: 0.02
    sterile: true

task:
  name: tissue_dissection
  description: "Dissect tissue layer using laparoscopic instruments"
  objectives:
    - name: tissue_identification
      description: "Identify the correct tissue plane"
      success_criteria: "Instrument contacts target tissue"
      weight: 1.0
    - name: dissection_start
      description: "Begin dissection at identified plane"
      success_criteria: "Tissue layer separated"
      weight: 2.0
    - name: complete_dissection
      description: "Complete the dissection without damage"
      success_criteria: "Target tissue fully dissected"
      weight: 3.0
  constraints:
    - name: max_force
      type: force
      target_entity: left_manipulator
      limits: [0.0, 8.0]
      penalty_weight: 5.0
    - name: max_force_right
      type: force
      target_entity: right_manipulator
      limits: [0.0, 5.0]
      penalty_weight: 5.0
  reward_shaping:
    success_reward: 100.0
    failure_penalty: -100.0
    time_penalty: -0.02
    distance_reward_scale: 0.5
    collision_penalty: -15.0
    tissue_damage_penalty: -50.0
  max_episode_length: 2000
  time_limit: 180.0

domain_randomization:
  physics:
    enabled: true
    mass_range: [0.95, 1.05]
    friction_range: [0.35, 0.45]
    damping_range: [0.4, 0.6]
  visual:
    enabled: true
    color_range: [0.9, 1.1]
    lighting_variation: [0.85, 1.15]
  dynamics:
    enabled: true
    action_noise: [0.0, 0.02]
  randomize_each_episode: true
  seed: null

simulator: mujoco

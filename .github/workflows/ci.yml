name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ runner.arch }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pybullet has no macOS arm64 wheel and its sdist fails under modern
          # Xcode SDKs — only install the `physics` extra on Linux (where a
          # wheel exists). The macOS job exercises mjpython/mujoco, not pybullet.
          if [ "$RUNNER_OS" = "Linux" ]; then
            pip install -e ".[dev,tracking,physics]"
          else
            pip install -e ".[dev,tracking]"
          fi

      - name: Lint with ruff
        if: runner.os == 'Linux'
        run: ruff check src/ tests/

      - name: Check formatting with black
        if: runner.os == 'Linux'
        run: black --check src/ tests/

      - name: Type check with mypy
        if: runner.os == 'Linux'
        # Mypy is non-blocking: the codebase has ~364 latent type errors
        # (pre-existing debt — mypy was previously never reached because ruff
        # failed first). Keep it running so the debt stays visible, but don't
        # block CI until the type cleanup workstream lands. Tracked separately.
        continue-on-error: true
        run: mypy src/surg_rl

      - name: Find mjpython (macOS)
        if: runner.os == 'macOS'
        id: mjpython
        run: |
          MJPYTHON=$(python -c "import mujoco; import os; print(os.path.join(os.path.dirname(mujoco.__path__[0]), 'bin', 'mjpython'))")
          echo "path=$MJPYTHON" >> "$GITHUB_OUTPUT"
          echo "Found mjpython at: $MJPYTHON"

      - name: Test with pytest (Linux)
        if: runner.os == 'Linux'
        run: pytest tests/ -m "not integration" -v

      - name: Test with mjpython (macOS)
        if: runner.os == 'macOS'
        run: |
          ${{ steps.mjpython.outputs.path }} -m pytest tests/ \
            -m "not integration" \
            -v \
            --ignore=tests/test_ros2_bridge.py \
            --ignore=tests/test_ros2_cli.py \
            --ignore=tests/test_ros2_controller.py \
            --ignore=tests/test_ros2_replay.py

  docker-ci:
    name: Docker Build (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build CUDA (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cuda
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ROCm (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.rocm
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Jetson (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.jetson
          platforms: linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  k8s-e2e:
    name: K8s PVC e2e (kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,k8s-test]"

      - name: Run PVC e2e test (CPU-only kind cluster)
        run: pytest tests/k8s/test_pvc_e2e.py -m k8s -v --cluster-name=surg-rl-e2e

apiVersion: batch/v1
kind: Job
metadata:
  name: surg-rl-training
  labels:
    app: surg-rl
    component: training
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: surg-rl
        component: training
    spec:
      restartPolicy: Never
      shareProcessNamespace: true
      serviceAccountName: surg-rl
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: wait-for-bridge
          image: ghcr.io/surg-rl/surg-rl/ros2:v0.3.0
          command:
            - sh
            - -c
            - |
              until ros2 topic list 2>/dev/null | grep -q surg_rl; do
                echo "Waiting for ROS2 bridge..."
                sleep 2
              done
              echo "Bridge ready"
      containers:
        - name: trainer
          image: ghcr.io/surg-rl/surg-rl/cuda:v0.3.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "surg_rl.cli"]
          args: ["train", "--scene", "/etc/surg-rl/scene.json", "--timesteps", "1000000"]
          env:
            - name: SURGRL_BRIDGE_SIDECAR
              value: "true"
            - name: PYTHONPATH
              value: /app/src
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: scene
              mountPath: /etc/surg-rl
              readOnly: true
            - name: checkpoints
              mountPath: /app/checkpoints
        - name: bridge
          image: ghcr.io/surg-rl/surg-rl/ros2:v0.3.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "surg_rl.cli"]
          args: ["ros2-bridge", "--scene", "/etc/surg-rl/scene.json"]
          env:
            - name: SURGRL_BRIDGE_PORT
              value: "9090"
            - name: PYTHONPATH
              value: /app/src
          ports:
            - containerPort: 9090
              name: bridge
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: scene
              mountPath: /etc/surg-rl
              readOnly: true
      volumes:
        - name: scene
          configMap:
            name: surg-rl-scene
        - name: checkpoints
          persistentVolumeClaim:
            claimName: surg-rl-checkpoints

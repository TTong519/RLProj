apiVersion: v1
kind: ServiceAccount
metadata:
  name: surg-rl
  labels:
    app: surg-rl
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: surg-rl
  labels:
    app: surg-rl
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: surg-rl
  labels:
    app: surg-rl
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: surg-rl
subjects:
  - kind: ServiceAccount
    name: surg-rl

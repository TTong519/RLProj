# Source: new file -- CPU-only read-Job for PVC persistence assertion.
# Applied STANDALONE via `kubectl apply -f k8s/overlays/e2e/read-job.yaml` in the
# test body AFTER the write-Job completes -- NOT listed in kustomization.yaml
# resources (would race the write-Job for /checkpoints/ckpt.bin before it exists).
apiVersion: batch/v1
kind: Job
metadata:
  name: surg-rl-e2e-read
  labels:
    app: surg-rl
    component: e2e
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: surg-rl
        component: e2e
    spec:
      restartPolicy: Never
      containers:
        - name: reader
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              sha256sum /checkpoints/ckpt.bin | awk '{print $1}'
          volumeMounts:
            - name: checkpoints
              mountPath: /checkpoints
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: surg-rl-checkpoints